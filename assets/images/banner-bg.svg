<svg width="1920" height="800" viewBox="0 0 1920 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 渐变定义 -->
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000000"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    
    <radialGradient id="glowGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:rgba(0,113,227,0.15)"/>
      <stop offset="100%" style="stop-color:rgba(0,113,227,0)"/>
    </radialGradient>
    
    <radialGradient id="glowGradient2" cx="30%" cy="40%" r="40%">
      <stop offset="0%" style="stop-color:rgba(99,91,255,0.1)"/>
      <stop offset="100%" style="stop-color:rgba(99,91,255,0)"/>
    </radialGradient>
    
    <radialGradient id="glowGradient3" cx="70%" cy="60%" r="40%">
      <stop offset="0%" style="stop-color:rgba(0,212,255,0.08)"/>
      <stop offset="100%" style="stop-color:rgba(0,212,255,0)"/>
    </radialGradient>
  </defs>
  
  <!-- 主背景 -->
  <rect width="1920" height="800" fill="url(#mainGradient)"/>
  
  <!-- 发光效果 -->
  <ellipse cx="960" cy="400" rx="600" ry="500" fill="url(#glowGradient)"/>
  <ellipse cx="576" cy="320" rx="400" ry="350" fill="url(#glowGradient2)"/>
  <ellipse cx="1344" cy="480" rx="400" ry="350" fill="url(#glowGradient3)"/>
  
  <!-- 网格线 -->
  <g stroke="rgba(255,255,255,0.03)" stroke-width="1">
    <!-- 垂直线 -->
    <line x1="0" y1="0" x2="0" y2="800"/>
    <line x1="120" y1="0" x2="120" y2="800"/>
    <line x1="240" y1="0" x2="240" y2="800"/>
    <line x1="360" y1="0" x2="360" y2="800"/>
    <line x1="480" y1="0" x2="480" y2="800"/>
    <line x1="600" y1="0" x2="600" y2="800"/>
    <line x1="720" y1="0" x2="720" y2="800"/>
    <line x1="840" y1="0" x2="840" y2="800"/>
    <line x1="960" y1="0" x2="960" y2="800"/>
    <line x1="1080" y1="0" x2="1080" y2="800"/>
    <line x1="1200" y1="0" x2="1200" y2="800"/>
    <line x1="1320" y1="0" x2="1320" y2="800"/>
    <line x1="1440" y1="0" x2="1440" y2="800"/>
    <line x1="1560" y1="0" x2="1560" y2="800"/>
    <line x1="1680" y1="0" x2="1680" y2="800"/>
    <line x1="1800" y1="0" x2="1800" y2="800"/>
    <line x1="1920" y1="0" x2="1920" y2="800"/>
    
    <!-- 水平线 -->
    <line x1="0" y1="0" x2="1920" y2="0"/>
    <line x1="0" y1="100" x2="1920" y2="100"/>
    <line x1="0" y1="200" x2="1920" y2="200"/>
    <line x1="0" y1="300" x2="1920" y2="300"/>
    <line x1="0" y1="400" x2="1920" y2="400"/>
    <line x1="0" y1="500" x2="1920" y2="500"/>
    <line x1="0" y1="600" x2="1920" y2="600"/>
    <line x1="0" y1="700" x2="1920" y2="700"/>
    <line x1="0" y1="800" x2="1920" y2="800"/>
  </g>
  
  <!-- 科技节点 -->
  <g fill="rgba(0,113,227,0.3)">
    <circle cx="240" cy="200" r="3"/>
    <circle cx="480" cy="350" r="3"/>
    <circle cx="720" cy="150" r="3"/>
    <circle cx="960" cy="400" r="4"/>
    <circle cx="1200" cy="250" r="3"/>
    <circle cx="1440" cy="450" r="3"/>
    <circle cx="1680" cy="300" r="3"/>
  </g>
  
  <!-- 连接线 -->
  <g stroke="rgba(0,113,227,0.15)" stroke-width="1">
    <line x1="240" y1="200" x2="480" y2="350"/>
    <line x1="480" y1="350" x2="720" y2="150"/>
    <line x1="720" y1="150" x2="960" y2="400"/>
    <line x1="960" y1="400" x2="1200" y2="250"/>
    <line x1="1200" y1="250" x2="1440" y2="450"/>
    <line x1="1440" y1="450" x2="1680" y2="300"/>
  </g>
</svg>
